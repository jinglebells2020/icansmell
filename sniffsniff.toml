# sniffsniff configuration — 6-sensor MQ array (Foundation milestone)
# The number of channel entries below defines N. Confirm/measure RL per module.

[board]
bits = 10          # Uno ADC resolution (10-bit → counts 0..1023)
vref = 5.0         # Uno ADC reference volts

[array]
vcc = 5.0          # sensor supply volts
# one entry per channel C0..C5 — direct wiring, each module's AO -> an Uno analog pin
# (A0=ch0, A1=ch1, A2=ch2, A3=ch3, A4=ch4, A5=ch5; no multiplexer)
channels = [
  { ch = 0, sensor = "MQ3",   rl = 1000 },
  { ch = 1, sensor = "MQ135", rl = 1000 },
  { ch = 2, sensor = "MQ2",   rl = 1000 },
  { ch = 3, sensor = "MQ4",   rl = 1000 },
  { ch = 4, sensor = "MQ8",   rl = 1000 },
  { ch = 5, sensor = "MQ7",   rl = 1000 },
]

[timing]
scan_hz     = 20
baseline_s  = 15
exposure_s  = 45
purge_s     = 90
plateau_s   = 10   # trailing exposure window for plateau_mean

[features]
ema_alphas = [0.1, 0.01, 0.001]

[baseline]
max_cv = 0.05      # reject baseline if any channel CV exceeds this
recover_tol = 0.02 # ±2% of R0 to count as recovered

[servo]
enabled = true         # drive the airflow servo automatically during a capture
pin = 12               # servo signal pin (documented in firmware; host just sends S<angle>)
fresh_air_angle = 0    # substance closed / fresh-air straw open (baseline & purge)
sample_angle = 105     # substance open / fresh-air closed (exposure)

[capture]              # adaptive-capture tuning (tolerance reuses recover_tol)
settle_hold_s = 3.0    # signal must be flat this long before measuring R0
settle_max_wait_s = 30 # give up settling after this and proceed anyway
plateau_hold_s = 3.0   # exposure ends after the response holds flat this long
smooth_alpha = 0.2     # EMA smoothing for the settle/recovery detectors (0 = off)
