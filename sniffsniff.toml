# sniffsniff configuration — 9-sensor MQ array across TWO Arduino Unos
#
# The two boards are merged EQUALLY into one 9-channel frame (in board order):
#   Uno 1: MQ5 MQ3 MQ135 MQ7 MQ9 MQ8   |   Uno 2: MQ2 MQ4 MQ6
# `ch` below is the LOCAL analog pin (A0=ch0 …) on that board; global channel
# indices 0..8 are assigned by concatenating the boards in order.
# (A single-board rig can still use a flat [array].channels table — see git history.)

[board]
bits = 10          # Uno ADC resolution (10-bit → counts 0..1023)
vref = 5.0         # Uno ADC reference volts

[array]
vcc = 5.0          # sensor supply volts

[[array.board]]                       # Uno 1 — 6 sensors
port = "/dev/cu.usbmodem101"          # <-- set to this Uno's serial device
channels = [
  { ch = 0, sensor = "MQ5",   rl = 1000 },   # A0 — LPG / natural gas
  { ch = 1, sensor = "MQ3",   rl = 1000 },   # A1 — alcohol / ethanol
  { ch = 2, sensor = "MQ135", rl = 1000 },   # A2 — VOCs + ammonia
  { ch = 3, sensor = "MQ7",   rl = 1000 },   # A3 — carbon monoxide
  { ch = 4, sensor = "MQ9",   rl = 1000 },   # A4 — CO + combustible gas
  { ch = 5, sensor = "MQ8",   rl = 1000 },   # A5 — hydrogen
]

[[array.board]]                       # Uno 2 — 3 sensors + airflow servo (servo on D12)
port = "/dev/cu.usbmodem1101"         # <-- set to this Uno's serial device
servo = true                          # the airflow servo is wired to THIS board
channels = [
  { ch = 0, sensor = "MQ2", rl = 1000 },     # A0 — broad smoke / VOC
  { ch = 1, sensor = "MQ4", rl = 1000 },     # A1 — methane
  { ch = 2, sensor = "MQ6", rl = 1000 },     # A2 — LPG / propane / butane
]

[timing]
scan_hz     = 20
baseline_s  = 15
exposure_s  = 45
purge_s     = 90
plateau_s   = 10   # trailing exposure window for plateau_mean

[features]
ema_alphas = [0.1, 0.01, 0.001]

[baseline]
max_cv = 0.05      # reject baseline if any channel CV exceeds this
recover_tol = 0.02 # ±2% of R0 to count as recovered

[servo]                # servo lives on the board flagged servo=true above
pin = 12               # servo signal pin (documented in firmware; host sends S<angle>)
fresh_air_angle = 0    # fresh-air straw open (baseline & purge)
sample_angle = 105     # sample straw open (exposure)

[capture]              # adaptive-capture tuning (tolerance reuses recover_tol)
settle_hold_s = 3.0    # signal must be flat this long before measuring R0
settle_max_wait_s = 30 # give up settling after this and proceed anyway
min_exposure_s = 15.0  # exposure floor — never plateau-stop before this
plateau_hold_s = 8.0   # end after the response sets no new high this long
plateau_eps = 0.005    # min fractional growth counted as a genuine new high
smooth_alpha = 0.2     # EMA smoothing for the settle/recovery detectors (0 = off)
